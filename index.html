        <p>Zehao Jin (金泽昊) is an M.S. student in Computational Science and Engineering
        at the Georgia Institute of Technology, advised by Prof. Chao Zhang, and a 2025
        B.S. graduate of Tsinghua University, where he worked with Prof. Yanan Sui. His
        research is on the alignment of large language models: mechanistic
        interpretability, safety and alignment, AI agents, and harness engineering — the
        neuroscience of LLMs. He has interned with the foundation-model teams at StepFun
        and Meituan LongCat.</p>
        <p>Sections: News, Experience, Publications, Awards. Read his

        <a href="docs/CV_Zehao_Jin_EN.pdf">English</a> or
        <a href="docs/CV_Zehao_Jin_CN.pdf">Chinese</a>.</p>
