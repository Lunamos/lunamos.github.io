      <stop offset="0" stop-color="#e7faf7"/>
      <stop offset="1" stop-color="#d6f5ef"/>
    </linearGradient>
    <linearGradient id="privShield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5a4"/>
