<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Sparse vs dense decomposition">
  <defs>
    <linearGradient id="saeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0ff"/>
      <stop offset="1" stop-color="#e3e7ff"/>
    </linearGradient>
    <linearGradient id="saeDense" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3948d2"/>
      <stop offset="1" stop-color="#6a5bff"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#saeBg)"/>
  <!-- sparse field (left) -->
  <g fill="#3948d2">
    <rect x="34" y="38" width="9" height="9" rx="2" opacity=".9"/>
    <rect x="70" y="60" width="9" height="9" rx="2" opacity=".55"/>
    <rect x="48" y="92" width="9" height="9" rx="2" opacity=".8"/>
    <rect x="26" y="126" width="9" height="9" rx="2" opacity=".5"/>
    <rect x="86" y="120" width="9" height="9" rx="2" opacity=".7"/>
    <rect x="60" y="150" width="9" height="9" rx="2" opacity=".45"/>
    <rect x="96" y="44" width="9" height="9" rx="2" opacity=".6"/>
    <rect x="100" y="86" width="9" height="9" rx="2" opacity=".5"/>
    <rect x="32" y="64" width="9" height="9" rx="2" opacity=".4"/>
  </g>
  <!-- arrow -->
  <path d="M120 100 H160" stroke="#9aa3c7" stroke-width="3" stroke-linecap="round"/>
  <path d="M156 92 L168 100 L156 108 Z" fill="#9aa3c7"/>
  <!-- dense low-rank block (right) -->
  <rect x="184" y="48" width="104" height="104" rx="16" fill="url(#saeDense)"/>
  <g stroke="#ffffff" stroke-width="3" opacity=".85" stroke-linecap="round">
    <path d="M204 78 H268"/>
    <path d="M204 100 H268"/>
    <path d="M204 122 H268"/>
  </g>
  <text x="236" y="178" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#3948d2" letter-spacing="1">scaffold</text>
</svg>
