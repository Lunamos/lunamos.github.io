<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Legacy URL shim: blog/post.html?slug=<slug> now lives at /blog/<slug>/.
       Redirect (preserving ?lang=) so old links and bookmarks keep working. -->
  <script>
    (function () {
      if (location.hostname === 'lunamos.github.io') {
        location.replace('https://zehaojin.com' + location.pathname + location.search + location.hash);
        return;
      }
      var p = new URLSearchParams(location.search);
      var slug = p.get('slug');
      var lang = p.get('lang');
      var dest = slug ? '/blog/' + encodeURIComponent(slug) + '/' : '/blog/';
      if (lang) dest += '?lang=' + encodeURIComponent(lang);
      location.replace(dest);
    })();
  </script>
  <link rel="canonical" href="https://zehaojin.com/blog/" />
  <meta name="robots" content="noindex,follow" />
  <title>Redirecting… · Zehao Jin</title>
</head>
<body>
  <noscript>
    <p>This page has moved. <a href="/blog/">Go to the blog index</a>.</p>
  </noscript>
</body>
</html>
